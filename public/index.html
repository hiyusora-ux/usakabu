<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Stock Radar — 米国 半導体・AI・フィジカルAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <div class="title">
      <h1>AI Stock Radar</h1>
      <span class="sub">米国株 — 半導体 / AI / フィジカルAI 優良株スクリーニング &amp; トピックス</span>
    </div>
    <div class="actions">
      <a class="navlink" href="./portfolio.html">投資管理 →</a>
      <span id="status" class="status">読み込み中…</span>
    </div>
  </header>

  <nav id="themes" class="themes"></nav>

  <section id="outlook-wrap" class="outlook-wrap" hidden>
    <div class="outlook-head">
      <h2>市場見通し <small id="outlook-mode">材料の整理</small></h2>
      <span class="disclaimer">※ 投資助言ではありません。情報提供のみ・投資判断は自己責任で。</span>
    </div>
    <div id="outlook-cards" class="outlook-cards"></div>
  </section>

  <section id="sectors-wrap" class="outlook-wrap" hidden>
    <div class="outlook-head">
      <h2>セクター相対比較 <small>相対強度（0-100）順・数値ベース</small></h2>
    </div>
    <div class="table-wrap">
      <table id="sectors-table">
        <thead>
          <tr>
            <th>#</th><th>セクター</th><th>相対強度</th><th>3Mモメンタム</th><th>6M</th>
            <th>平均スコア</th><th>ブレッド</th><th>売上成長</th><th>銘柄数</th><th>推移</th>
          </tr>
        </thead>
        <tbody id="sectors-body"></tbody>
      </table>
    </div>

    <div id="trend-wrap" class="trend-wrap">
      <div class="trend-head">
        <span class="trend-title">相対強度の推移</span>
        <span id="trend-legend" class="trend-legend"></span>
      </div>
      <div id="trend-chart" class="trend-chart"></div>
    </div>
  </section>

  <main>
    <section class="panel screener">
      <h2>優良株ランキング <small>総合スコア順</small></h2>
      <div class="table-wrap">
        <table id="screener-table">
          <thead>
            <tr>
              <th>#</th><th>銘柄</th><th>株価</th><th class="score-col">スコア</th>
              <th>売上成長</th><th>粗利率</th><th>ROE</th>
              <th>3M</th><th>6M</th><th>目標余地</th><th>予想PER</th><th>評価</th>
            </tr>
          </thead>
          <tbody id="screener-body"></tbody>
        </table>
      </div>
    </section>

    <section class="panel topics">
      <h2>トピックス <small>最新ニュース</small></h2>
      <ul id="topics-list"></ul>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
